services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-payment_router}
      POSTGRES_USER: ${POSTGRES_USER:-payment_router}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payment_router}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payment_router}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.8.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms256M"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-payment_router}:${POSTGRES_PASSWORD:-payment_router}@postgres:5432/${POSTGRES_DB:-payment_router}
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ROOT_PATH: ${ROOT_PATH:-}
      ENV: ${ENV:-local}
      WEBHOOK_HMAC_SECRET: ${WEBHOOK_HMAC_SECRET:-dev-only-change-in-prod}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    command: uvicorn payment_router.api:app --host 0.0.0.0 --port 8090 ${UVICORN_EXTRA_ARGS:-}
    restart: unless-stopped

  worker:
    build: .
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-payment_router}:${POSTGRES_PASSWORD:-payment_router}@postgres:5432/${POSTGRES_DB:-payment_router}
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ENV: ${ENV:-local}
      WEBHOOK_HMAC_SECRET: ${WEBHOOK_HMAC_SECRET:-dev-only-change-in-prod}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A payment_router.celery_app worker --loglevel=info
    restart: unless-stopped

volumes:
  postgres_data:
  kafka_data:
