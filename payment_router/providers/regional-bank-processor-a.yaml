name: regional-bank-processor-a
display_name: Regional Bank Processor A
base_approval_rate: 0.82

latency:
  p50_ms: 280
  p95_ms: 780
  p99_ms: 1400

three_ds:
  challenge_rate: 0.45
  frictionless_rate: 0.55
  version_2_2_rate: 0.55

card_type_modifiers:
  # Regional banks process strong issuer-side debit-rail volume; debit
  # outperforms credit on domestic by ~3pp.
  credit: 1.00
  debit: 1.03
  prepaid: 0.80
  commercial: 0.96

decline_codes:
  - code: "05"
    weight: 45.0
  - code: "51"
    weight: 18.0
  - code: "54"
    weight: 7.0
  - code: "14"
    weight: 5.0
  - code: "13"
    weight: 5.0
  - code: "57"
    weight: 4.0
  - code: "RC"
    weight: 5.0
  - code: "91"
    weight: 5.0
  - code: "61"
    weight: 6.0

supported_currencies:
  - USD
  - BRL
  - MXN
  - COP
  - CLP
  - PEN
  - ARS

amount_modifier_thresholds:
  # 2026-04-27 baseline lift: $1k tier eased from 0.91 to 0.95 so the
  # broad sweep median lands at the high end of the regional-specialist
  # band (85-92% on home corridor, 80-88% cross-border).
  "0": 1.00
  "500": 0.98
  "1000": 0.95
  "5000": 0.82
  "10000": 0.74

