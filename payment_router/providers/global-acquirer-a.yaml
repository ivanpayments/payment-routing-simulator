name: global-acquirer-a
display_name: Global Acquirer A
base_approval_rate: 0.87

latency:
  p50_ms: 180
  p95_ms: 420
  p99_ms: 700

three_ds:
  challenge_rate: 0.18
  frictionless_rate: 0.82
  version_2_2_rate: 0.84

card_type_modifiers:
  # Debit > Credit by ~2pp: funds-on-deposit means lower NSF declines on
  # mainstream domestic card volume. Prepaid drags due to issuer-side
  # ATM-network and load restrictions. Commercial slightly below credit
  # because of velocity / category limits.
  credit: 1.00
  debit: 1.02
  prepaid: 0.87
  commercial: 0.99

decline_codes:
  - code: "05"
    weight: 28.0
  - code: "51"
    weight: 22.0
  - code: "61"
    weight: 10.0
  - code: "14"
    weight: 8.0
  - code: "54"
    weight: 7.0
  - code: "65"
    weight: 8.0
  - code: "57"
    weight: 5.0
  - code: "91"
    weight: 7.0
  - code: "59"
    weight: 5.0

supported_currencies:
  - USD
  - EUR
  - GBP
  - BRL
  - MXN
  - INR
  - AUD
  - CAD
  - SGD
  - JPY
  - AED
  - CHF
  - SEK
  - NOK
  - DKK
  - PLN

amount_modifier_thresholds:
  # Amount sensitivity: realistic acquirer data shows clear drops as ticket
  # size crosses $500 / $1,000 / $5,000 issuer-risk thresholds. 2026-04-27
  # baseline lift: $1k tier eased from 0.93 to 0.96 so a global acquirer's
  # median across 9-country sweep lands in the 88-92% band rather than the
  # mid-80s. $5k+ tiers unchanged — large tickets still earn the issuer drag.
  "0": 1.00
  "500": 0.98
  "1000": 0.96
  "5000": 0.86
  "10000": 0.80

