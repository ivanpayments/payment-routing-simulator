name: high-risk-or-orchestrator-b
display_name: High-Risk Orchestrator B
base_approval_rate: 0.90

# Orchestrator semantics: approval is bounded by the best single PSP in the corridor,
# plus a small intra-corridor lift (brand-level routing, retry-aware cascade within
# a single provider attempt). Per-country rates below derived as
#   max(non_orchestrator_provider.country_rate) + 1.0pp
# capped at +2pp lift and 0.95 absolute ceiling. base_rate 0.90 is the neutral
# default for corridors not explicitly tuned.
#
# Note: this is still a single-distribution simulation. Actual multi-PSP fallback
# would require an engine code path that samples multiple providers and returns
# the first success. The YAML values are statistically calibrated to mimic
# best-of-corridor outcomes, not a literal router.

latency:
  p50_ms: 178
  p95_ms: 395
  p99_ms: 810

three_ds:
  challenge_rate: 0.10
  frictionless_rate: 0.90
  version_2_2_rate: 0.85

card_type_modifiers:
  credit: 1.00
  debit: 0.99
  prepaid: 0.92
  commercial: 0.99

decline_codes:
  - code: "05"
    weight: 36.0
  - code: "51"
    weight: 28.0
  - code: "91"
    weight: 10.0
  - code: "61"
    weight: 6.0
  - code: "14"
    weight: 6.0
  - code: "54"
    weight: 6.0
  - code: "62"
    weight: 4.0
  - code: "57"
    weight: 4.0

supported_currencies:
  - USD
  - EUR
  - GBP
  - CAD
  - AUD
  - BRL
  - MXN
  - INR
  - SGD
  - JPY
  - AED
  - CHF
  - SEK
  - NOK
  - DKK
  - PLN
  - ARS
  - COP

amount_modifier_thresholds:
  # Orchestrator cascade can partially offset large-ticket friction but the
  # ticket-size sensitivity of the underlying processors still bleeds through.
  # 2026-04-27 baseline lift: $1k tier eased from 0.92 to 0.95 (cascade
  # benefit on $1k tickets is realistic given multi-PSP fallback).
  "0": 1.00
  "500": 0.98
  "1000": 0.95
  "5000": 0.83
  "10000": 0.76

countries:
  US:
    base: 0.92
    card_modifiers:
      amex: 0.96
      mastercard: 1.00
      visa: 1.00
    three_ds:
      challenge_rate: 0.08
      frictionless_rate: 0.92
      version_2_2_rate: 0.85
  CA:
    base: 0.90
    card_modifiers:
      amex: 0.98
      mastercard: 1.00
      visa: 1.00
    three_ds:
      challenge_rate: 0.10
      frictionless_rate: 0.90
      version_2_2_rate: 0.85
  GB:
