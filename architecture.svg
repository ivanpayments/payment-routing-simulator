<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 920" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 600; fill: #111; }
    .subtitle { font-size: 13px; fill: #555; }
    .section-label { font-size: 11px; fill: #8a8a8a; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; }
    .box { fill: #ffffff; stroke: #1a1a1a; stroke-width: 1.4; }
    .box-accent { fill: #fff7e6; stroke: #c6a668; stroke-width: 1.8; }
    .box-soft { fill: #f7f7f5; stroke: #bdbdbd; stroke-width: 1.2; }
    .box-engine { fill: #ffffff; stroke: #c6a668; stroke-width: 1.6; }
    .box-outside { fill: #fafafa; stroke: #888; stroke-width: 1.2; stroke-dasharray: 5 3; }
    .box-title { font-size: 14px; font-weight: 600; fill: #111; }
    .box-desc { font-size: 11.5px; fill: #444; }
    .box-desc-small { font-size: 10.5px; fill: #555; }
    .arrow { fill: none; stroke: #222; stroke-width: 1.6; marker-end: url(#arrow); }
    .arrow-dashed { fill: none; stroke: #888; stroke-width: 1.3; stroke-dasharray: 5 4; marker-end: url(#arrow); }
    .flow-label { font-size: 10.5px; fill: #666; font-style: italic; }
    .pill { fill: #fdf5e6; stroke: #c6a668; stroke-width: 1; }
    .pill-text { font-size: 10.5px; fill: #6b5626; font-weight: 500; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#222"/>
    </marker>
  </defs>

  <!-- ========== HEADER ========== -->
  <text x="30" y="34" class="title">How a transaction flows through the routing simulator</text>
  <text x="30" y="56" class="subtitle">A merchant call enters at the left, runs through FastAPI's middleware, hits the simulation engine, and then triggers state writes, event publishing, and webhook delivery.</text>

  <!-- ========== SECTION 1: THE CALL ARRIVES ========== -->
  <text x="30" y="94" class="section-label">1 · The call arrives</text>

  <!-- Merchant -->
  <rect x="30" y="110" width="200" height="90" rx="8" class="box"/>
  <text x="130" y="138" text-anchor="middle" class="box-title">Merchant</text>
  <text x="130" y="160" text-anchor="middle" class="box-desc">Calls the API from an</text>
  <text x="130" y="177" text-anchor="middle" class="box-desc">integration test, chatbot,</text>
  <text x="130" y="194" text-anchor="middle" class="box-desc">or CI pipeline.</text>

  <!-- Caddy -->
  <rect x="270" y="110" width="250" height="90" rx="8" class="box"/>
  <text x="395" y="138" text-anchor="middle" class="box-title">Caddy reverse proxy</text>
  <text x="395" y="160" text-anchor="middle" class="box-desc">Terminates HTTPS and sends</text>
  <text x="395" y="177" text-anchor="middle" class="box-desc">every `/router/*` request to the</text>
  <text x="395" y="194" text-anchor="middle" class="box-desc">FastAPI container on port 8090.</text>

  <!-- arrows -->
  <path class="arrow" d="M230 155 L268 155"/>
  <path class="arrow-dashed" d="M268 172 L230 172"/>
  <text x="249" y="148" text-anchor="middle" class="flow-label">request</text>
  <text x="249" y="188" text-anchor="middle" class="flow-label">response</text>

  <path class="arrow" d="M395 202 L395 232"/>

  <!-- ========== SECTION 2: FASTAPI ========== -->
  <text x="30" y="258" class="section-label">2 · FastAPI checks the request, then runs the simulation</text>

  <!-- Big FastAPI container -->
  <rect x="30" y="275" width="1140" height="280" rx="12" class="box-accent"/>
  <text x="50" y="298" class="section-label" style="letter-spacing: 0.1em">FASTAPI · uvicorn :8090 · Docker</text>

  <!-- Middleware row -->
  <text x="50" y="322" class="flow-label">Gate row · each middleware can reject the request before it reaches the engine.</text>

  <rect x="50" y="335" width="260" height="90" rx="6" class="box"/>
  <text x="180" y="360" text-anchor="middle" class="box-title">Size check</text>
  <text x="180" y="382" text-anchor="middle" class="box-desc">Rejects any request body</text>
  <text x="180" y="399" text-anchor="middle" class="box-desc">larger than 1 MB before it</text>
  <text x="180" y="416" text-anchor="middle" class="box-desc">reaches the auth layer.</text>

  <rect x="330" y="335" width="260" height="90" rx="6" class="box"/>
  <text x="460" y="360" text-anchor="middle" class="box-title">Authentication</text>
  <text x="460" y="382" text-anchor="middle" class="box-desc">Validates the Bearer API key</text>
  <text x="460" y="399" text-anchor="middle" class="box-desc">(SHA-256 lookup). Returns 401</text>
  <text x="460" y="416" text-anchor="middle" class="box-desc">if missing or wrong.</text>

  <rect x="610" y="335" width="260" height="90" rx="6" class="box"/>
  <text x="740" y="360" text-anchor="middle" class="box-title">Rate limit</text>
  <text x="740" y="382" text-anchor="middle" class="box-desc">Caps each API key at 100</text>
  <text x="740" y="399" text-anchor="middle" class="box-desc">calls/min and each client IP</text>
  <text x="740" y="416" text-anchor="middle" class="box-desc">at 60/min. Returns 429 on over-use.</text>

  <rect x="890" y="335" width="260" height="90" rx="6" class="box"/>
  <text x="1020" y="360" text-anchor="middle" class="box-title">Duplicate check</text>
  <text x="1020" y="382" text-anchor="middle" class="box-desc">If the caller sends the same</text>
  <text x="1020" y="399" text-anchor="middle" class="box-desc">`Idempotency-Key` within 24 h,</text>
  <text x="1020" y="416" text-anchor="middle" class="box-desc">returns the cached response.</text>

  <!-- funnel arrow from middleware to engine -->
  <path class="arrow" d="M600 430 L600 452"/>

  <!-- Engine row label -->
  <text x="50" y="449" class="flow-label">Engine row · the simulation itself — loads the acquirer profile, draws outcomes, applies rules, returns JSON.</text>

  <rect x="50" y="460" width="260" height="80" rx="6" class="box-engine"/>
  <text x="180" y="484" text-anchor="middle" class="box-title">Load acquirer profile</text>
  <text x="180" y="506" text-anchor="middle" class="box-desc">Reads the YAML for the chosen</text>
  <text x="180" y="523" text-anchor="middle" class="box-desc">archetype (global-acquirer, etc.).</text>

  <rect x="330" y="460" width="260" height="80" rx="6" class="box-engine"/>
  <text x="460" y="484" text-anchor="middle" class="box-title">Draw outcomes</text>
  <text x="460" y="506" text-anchor="middle" class="box-desc">Samples approval, latency, 3DS</text>
  <text x="460" y="523" text-anchor="middle" class="box-desc">flow, and decline code.</text>

  <rect x="610" y="460" width="260" height="80" rx="6" class="box-engine"/>
  <text x="740" y="484" text-anchor="middle" class="box-title">Apply correctness rules</text>
  <text x="740" y="506" text-anchor="middle" class="box-desc">35 rules block impossible</text>
  <text x="740" y="523" text-anchor="middle" class="box-desc">combos (e.g., 3DS on MIT).</text>

  <rect x="890" y="460" width="260" height="80" rx="6" class="box"/>
  <text x="1020" y="484" text-anchor="middle" class="box-title">Build the JSON response</text>
  <text x="1020" y="506" text-anchor="middle" class="box-desc">Returns decline code, latency,</text>
  <text x="1020" y="523" text-anchor="middle" class="box-desc">3DS status, txn ID, and state.</text>

  <!-- arrows between engine stages -->
  <path class="arrow" d="M310 500 L328 500"/>
  <path class="arrow" d="M590 500 L608 500"/>
  <path class="arrow" d="M870 500 L888 500"/>

  <!-- ========== SECTION 3: STATE + EVENTS ========== -->
  <text x="30" y="596" class="section-label">3 · After each call, the system writes state and fans out events</text>

  <!-- Postgres -->
  <rect x="30" y="615" width="270" height="130" rx="8" class="box-soft"/>
  <text x="165" y="640" text-anchor="middle" class="box-title">Payment ledger (Postgres)</text>
  <text x="165" y="664" text-anchor="middle" class="box-desc">Stores every transaction and</text>
  <text x="165" y="681" text-anchor="middle" class="box-desc">every state transition. Rejects</text>
  <text x="165" y="698" text-anchor="middle" class="box-desc">illegal moves with HTTP 409.</text>
  <rect x="48" y="708" width="234" height="26" rx="4" class="pill"/>
  <text x="165" y="725" text-anchor="middle" class="pill-text">Pending → Authorized → Captured → Refunded</text>

  <!-- Redis -->
  <rect x="320" y="615" width="260" height="130" rx="8" class="box-soft"/>
  <text x="450" y="640" text-anchor="middle" class="box-title">Cache &amp; queue (Redis)</text>
  <text x="450" y="664" text-anchor="middle" class="box-desc">Three jobs in one store: the</text>
  <text x="450" y="681" text-anchor="middle" class="box-desc">idempotency cache, the rate-limit</text>
  <text x="450" y="698" text-anchor="middle" class="box-desc">counter, and the Celery job</text>
  <text x="450" y="715" text-anchor="middle" class="box-desc">queue for webhooks.</text>

  <!-- Kafka -->
  <rect x="600" y="615" width="260" height="130" rx="8" class="box-soft"/>
  <text x="730" y="640" text-anchor="middle" class="box-title">Event stream (Kafka)</text>
  <text x="730" y="664" text-anchor="middle" class="box-desc">Publishes every state change</text>
  <text x="730" y="681" text-anchor="middle" class="box-desc">to the `payment.events` topic,</text>
  <text x="730" y="698" text-anchor="middle" class="box-desc">so analytics and ML pipelines</text>
  <text x="730" y="715" text-anchor="middle" class="box-desc">can replay the full history.</text>

  <!-- Celery -->
  <rect x="880" y="615" width="290" height="130" rx="8" class="box-soft"/>
  <text x="1025" y="640" text-anchor="middle" class="box-title">Webhook delivery (Celery)</text>
  <text x="1025" y="664" text-anchor="middle" class="box-desc">Signs each event with HMAC-SHA256</text>
  <text x="1025" y="681" text-anchor="middle" class="box-desc">and POSTs it to the merchant's URL.</text>
  <text x="1025" y="698" text-anchor="middle" class="box-desc">Retries failed sends with backoff</text>
  <text x="1025" y="715" text-anchor="middle" class="box-desc">1 → 2 → 4 → 8 → 16 s, then DLQ.</text>

  <!-- Arrows from FastAPI engine to persistence -->
  <path class="arrow-dashed" d="M165 555 L165 613"/>
  <path class="arrow-dashed" d="M450 555 L450 613"/>
  <path class="arrow-dashed" d="M730 555 L730 613"/>
  <path class="arrow-dashed" d="M1025 555 L1025 613"/>

  <!-- Celery → merchant webhook endpoint -->
  <rect x="880" y="785" width="290" height="60" rx="8" class="box-outside"/>
  <text x="1025" y="809" text-anchor="middle" class="box-title">Merchant's webhook URL</text>
  <text x="1025" y="828" text-anchor="middle" class="box-desc-small">Receives signed `payment.*` events and verifies the HMAC header.</text>
  <path class="arrow" d="M1025 745 L1025 783"/>

  <!-- ========== SECTION 4: OFFLINE ========== -->
  <text x="30" y="786" class="section-label">4 · Same engine, batch mode (offline)</text>

  <rect x="30" y="805" width="820" height="90" rx="8" class="box-soft"/>
  <text x="440" y="832" text-anchor="middle" class="box-title">Synthetic dataset generator</text>
  <text x="440" y="854" text-anchor="middle" class="box-desc">Runs the same engine + same 35 rules against 106,739 synthetic transactions,</text>
  <text x="440" y="871" text-anchor="middle" class="box-desc">producing a CSV used for regression testing and as training data for the</text>
  <text x="440" y="888" text-anchor="middle" class="box-desc">decline-recovery ML model. If live API output diverges from the CSV, that's a bug.</text>

  <!-- shared-module link: from "apply rules" box down along right margin into the offline box -->
  <path class="arrow-dashed" d="M740 540 L740 575 L1185 575 L1185 770 L850 770 L850 805"/>
  <text x="955" y="765" text-anchor="middle" class="flow-label">same rule module — online and offline stay consistent</text>
</svg>
